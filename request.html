<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Request — Luna Space</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root{
      --ink:#111;
      --line:#dcdcdc;
      --bg:#fafafa;
      --accent:#000;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    .container{
      max-width:720px;
      margin:0 auto;
      padding:80px 24px 120px;
    }

    .back{
      display:inline-block;
      margin-bottom:48px;
      text-decoration:none;
      color:var(--ink);
      border-bottom:1px solid transparent;
    }
    .back:hover{border-color:var(--ink)}

    h1{
      font-size:28px;
      font-weight:500;
      margin:0 0 12px;
      letter-spacing:0.02em;
    }

    .subtitle{
      font-size:14px;
      color:#555;
      margin-bottom:40px;
    }

    .package-label{
      display:inline-block;
      font-size:12px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      border:1px solid var(--line);
      padding:6px 10px;
      margin-bottom:32px;
    }

    form{
      display:grid;
      gap:28px;
    }

    label{
      font-size:12px;
      letter-spacing:0.12em;
      text-transform:uppercase;
    }

    input, textarea{
      width:100%;
      padding:14px 16px;
      border:1px solid var(--line);
      background:#fff;
      font-size:14px;
      outline:none;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    input:focus, textarea:focus{
      border-color:var(--ink);
    }

    .btn{
      align-self:flex-start;
      padding:16px 40px;
      border:1px solid var(--ink);
      background:transparent;
      font-family:inherit;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        120deg,
        transparent 30%,
        rgba(255,255,255,0.9),
        transparent 70%
      );
      transform:translateX(-100%);
      transition:.8s;
    }

    .btn:hover::before{
      transform:translateX(100%);
    }

    footer{
      margin-top:120px;
      font-size:12px;
      color:#777;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="container">

    <a href="entity-vera.html" class="back">← Вернуться к персонажу</a>

    <h1>Заявка на приобретение</h1>
    <div class="subtitle">
      Все запросы рассматриваются вручную.  
      Персонажи создаются и передаются в единственном экземпляре.
    </div>

    <div id="package" class="package-label">
      PACKAGE: —
    </div>

    <form>
      <div>
        <label>Имя</label>
        <input type="text" placeholder="Ваше имя" required />
      </div>

      <div>
        <label>Email</label>
        <input type="email" placeholder="name@email.com" required />
      </div>

      <div>
        <label>Проект / компания</label>
        <input type="text" placeholder="Название бренда или проекта" />
      </div>

      <div>
        <label>Комментарий</label>
        <textarea placeholder="Кратко опишите задачу или ожидания"></textarea>
      </div>

      <button class="btn" type="submit">
        Отправить запрос
      </button>
    </form>

   <footer>
  © 2026 All rights reserved.
  <a href="terms.html">Terms of Service</a>
  <a href="privacy.html">Privacy Policy</a>
</footer>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pkg = params.get('package');

    if(pkg){
      document.getElementById('package').innerText =
        'PACKAGE: ' + pkg.toUpperCase();
    }
  </script>
</body>
</html>
